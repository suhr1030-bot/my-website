<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業人力資源管理儀表板 | HR Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
    <!-- Chart.js Datalabels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <!-- SheetJS (XLSX) for Excel Import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        canvas { cursor: pointer; }

        /* Modal Backdrop */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { Chart } = window;

        if (window.ChartDataLabels) {
            Chart.register(window.ChartDataLabels);
        }

        // --- 輔助函數 ---
        const calculateTenure = (hireDate, leaveDate) => {
            if (!hireDate) return 0;
            const start = new Date(hireDate);
            if (isNaN(start.getTime())) return 0; 

            let end = new Date(); 
            if (leaveDate) {
                const leave = new Date(leaveDate);
                if (!isNaN(leave.getTime())) end = leave;
            }

            const diffTime = end - start;
            if (diffTime < 0) return 0;
            const diffYears = diffTime / (1000 * 60 * 60 * 24 * 365.25); 
            return diffYears;
        };

        const calculateAge = (birthday) => {
            if (!birthday) return 0;
            const birthDate = new Date(birthday);
            if (isNaN(birthDate.getTime())) return 0;
            
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        };

        const getJobLevel = (role) => {
            if (!role) return '非主管職';
            const r = String(role).trim();
            const highLevelKeywords = ['總經理', '總裁', '榮譽董事長', '董事長', '副總裁', '副總經理', '執行董事', '群總', '資深協理', '協理'];
            if (highLevelKeywords.some(k => r.includes(k))) return '高階主管';
            const midLevelKeywords = ['一級經理', '二級經理', '一級副理', '二級副理', '一級襄理', '二級襄理'];
            if (midLevelKeywords.some(k => r.includes(k))) return '中階主管';
            const lowLevelKeywords = ['課長', '副課長', '組長', '副組長'];
            if (lowLevelKeywords.some(k => r.includes(k))) return '基層主管';
            return '非主管職';
        };

        const validateEmployeeData = (emp) => {
            const errors = [];
            if (!emp.name) errors.push("缺姓名");
            if (!emp.dept) errors.push("缺部門");
            if (!emp.role) errors.push("缺職稱");
            
            if (emp.hireDate && isNaN(Date.parse(emp.hireDate))) errors.push("到職日格式錯");
            if (emp.leaveDate && isNaN(Date.parse(emp.leaveDate))) errors.push("離職日格式錯");
            if (emp.birthday && isNaN(Date.parse(emp.birthday))) errors.push("生日格式錯"); 
            
            return errors.length > 0 ? errors.join("; ") : null;
        };

        // 資料欄位映射表
        const KEY_MAP = {
            '姓名': 'name', 'name': 'name',
            '部門': 'dept', 'dept': 'dept',
            '職稱': 'role', 'role': 'role',
            '國籍': 'nationality', 'nationality': 'nationality', '國籍/地區': 'nationality',
            '身分類別': 'identity', '身分別': 'identity', 'identity': 'identity', '身分': 'identity', '身份類別': 'identity', '身份別': 'identity', '身份': 'identity',
            '特殊身分': 'special', '特殊身份': 'special', 'special': 'special', '特殊身分說明': 'special',
            '性別': 'gender', 'gender': 'gender',
            '生日': 'birthday', 'birthday': 'birthday', '出生年月日': 'birthday', 'dob': 'birthday',
            '到職日': 'hireDate', '報到日': 'hireDate', 'hiredate': 'hireDate',
            '離職日': 'leaveDate', 'leavedate': 'leaveDate',
            '學歷': 'education', 'education': 'education', '最高學歷': 'education',
            '薪資': 'salary', 'salary': 'salary', '本薪': 'salary',
            '績效': 'performance', 'performance': 'performance', '考績': 'performance',
            '狀態': 'status', 'status': 'status'
        };

        // 清理檔頭 BOM
        const cleanHeader = (header) => {
            if (!header) return "";
            return String(header).replace(/^\uFEFF/, '').trim();
        };

        // Excel 資料標準化函數
        const normalizeImportData = (rawData) => {
            return rawData.map((row, index) => {
                const emp = { id: Date.now() + index };
                Object.keys(row).forEach(key => {
                    const cleanKey = cleanHeader(key);
                    const mappedKey = KEY_MAP[cleanKey] || KEY_MAP[cleanKey.toLowerCase()];
                    if (mappedKey) {
                        let value = row[key];
                        if (value instanceof Date) {
                            const offset = value.getTimezoneOffset() * 60000;
                            const localDate = new Date(value.getTime() - offset);
                            value = localDate.toISOString().split('T')[0];
                        } else if (typeof value === 'string' && value.includes('/')) {
                            value = value.replace(/\//g, '-');
                        }
                        emp[mappedKey] = value ? String(value).trim() : '';
                    }
                });
                
                if (emp.identity) {
                    if (emp.identity.includes('移工')) emp.identity = '外籍移工';
                    else if (emp.identity.includes('僑外') || emp.identity.includes('僑生')) emp.identity = '僑外生';
                } else {
                    emp.identity = '國人';
                }

                if (!emp.status) {
                    if (emp.leaveDate) emp.status = '已離職';
                    else emp.status = '正式';
                }

                const errorMsg = validateEmployeeData(emp);
                if (errorMsg) emp.error = errorMsg;
                return emp;
            }).filter(e => e.name);
        };

        const INITIAL_EMPLOYEES = [];

        // --- Icons ---
        const Icons = {
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Briefcase: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            UserCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>,
            UserX: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="8" x2="23" y2="14"/><line x1="23" y1="8" x2="17" y2="14"/></svg>,
            Tag: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>,
            Plane: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12h20"/><path d="M13 2l9 10-9 10"/><path d="M2 12l5-5m0 10l-5-5"/></svg>,
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>,
            Filter: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>,
            XCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>,
            Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-2.26C17.81 13.47 19 11.38 19 9a7 7 0 0 0-7-7z"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        };

        // --- Chart Components ---
        const ChartComponent = ({ type, data, options, onElementClick }) => {
            const chartRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !Chart) return;
                if (chartRef.current) chartRef.current.destroy();

                const finalOptions = {
                    ...options,
                    onClick: (e, elements, chart) => {
                        if (onElementClick && elements.length > 0) {
                            const index = elements[0].index;
                            const label = chart.data.labels[index];
                            onElementClick(label);
                        }
                    }
                };

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, { type, data, options: finalOptions });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [type, data, options, onElementClick]);

            return <canvas ref={canvasRef} />;
        };

        const ChartWithLegend = ({ title, data, icon: Icon, onSelect }) => {
            const total = useMemo(() => data.datasets[0].data.reduce((a, b) => a + b, 0), [data]);
            const options = { maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false }, datalabels: { display: false } }, onHover: (e, el) => { e.native.target.style.cursor = el.length ? 'pointer' : 'default'; } };

            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full">
                    <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">{Icon && <Icon />} {title}</h3>
                    <div className="flex flex-col sm:flex-row items-center gap-6 flex-grow">
                        <div className="w-full sm:w-1/2 h-48 relative">
                            <ChartComponent type="doughnut" data={data} options={options} onElementClick={onSelect} />
                            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                <span className="text-xs text-slate-400 font-medium">總計</span>
                                <span className="text-2xl font-bold text-slate-700">{total}</span>
                            </div>
                        </div>
                        <div className="w-full sm:w-1/2 space-y-3 overflow-y-auto max-h-48 pr-2">
                            {data.labels.map((label, idx) => {
                                const value = data.datasets[0].data[idx];
                                const color = Array.isArray(data.datasets[0].backgroundColor) ? data.datasets[0].backgroundColor[idx] : data.datasets[0].backgroundColor;
                                const percent = total > 0 ? ((value / total) * 100).toFixed(1) + '%' : '0%';
                                return (
                                    <div key={idx} onClick={() => onSelect(label)} className="flex justify-between items-center text-sm border-b border-slate-50 last:border-0 pb-1 cursor-pointer hover:bg-slate-50 transition-colors rounded px-1">
                                        <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: color}}></span><span className="text-slate-600 truncate max-w-[100px]" title={label}>{label}</span></div>
                                        <div className="flex items-center gap-2 text-right"><span className="font-bold text-slate-700">{value}</span><span className="text-xs text-slate-400 w-12">{percent}</span></div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Department Filter Modal ---
        const DepartmentFilterModal = ({ isOpen, onClose, departments, selectedDepts, onApply }) => {
            const [localSelected, setLocalSelected] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                if (isOpen) {
                    setLocalSelected(selectedDepts || []);
                }
            }, [isOpen, selectedDepts]);

            const filteredDepts = departments.filter(d => d.toLowerCase().includes(searchTerm.toLowerCase()));

            const toggleDept = (dept) => {
                setLocalSelected(prev => prev.includes(dept) ? prev.filter(d => d !== dept) : [...prev, dept]);
            };

            const handleSelectAll = () => setLocalSelected(filteredDepts);
            const handleClear = () => setLocalSelected([]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-backdrop p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col max-h-[80vh] animate-fade-in">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.Briefcase /> 選擇部門</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icons.XCircle size={24}/></button>
                        </div>
                        <div className="p-4 border-b border-slate-100 flex gap-2">
                            <div className="relative flex-1">
                                <span className="absolute left-3 top-2.5 text-slate-400"><Icons.Search size={16} /></span>
                                <input type="text" placeholder="搜尋部門..." className="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 transition" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={handleSelectAll} className="px-3 py-2 text-xs font-bold text-blue-600 hover:bg-blue-50 rounded-lg">全選</button>
                            <button onClick={handleClear} className="px-3 py-2 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-lg">清除</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-2">
                            {filteredDepts.map(dept => (
                                <div key={dept} onClick={() => toggleDept(dept)} className={`cursor-pointer px-3 py-2 rounded-lg text-sm border flex items-center justify-between transition ${localSelected.includes(dept) ? 'bg-blue-50 border-blue-200 text-blue-700 font-bold' : 'bg-white border-slate-100 text-slate-600 hover:bg-slate-50'}`}>
                                    {dept} {localSelected.includes(dept) && <Icons.Check />}
                                </div>
                            ))}
                            {filteredDepts.length === 0 && <div className="col-span-2 text-center text-slate-400 py-4">找不到符合的部門</div>}
                        </div>
                        <div className="p-6 border-t border-slate-100 flex justify-end gap-3">
                            <button onClick={onClose} className="px-5 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg">取消</button>
                            <button onClick={() => { onApply(localSelected); onClose(); }} className="px-5 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md">確認選取 ({localSelected.length})</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Dashboard Configuration Modal ---
        const DashboardConfigModal = ({ isOpen, onClose, config, onConfigChange }) => {
            if (!isOpen) return null;

            const configItems = [
                { id: 'insights', label: '智慧決策洞察 (AI Insights)' },
                { id: 'kpi', label: 'KPI 指標 (人數、離職率等)' },
                { id: 'deptChart', label: '部門人數佔比' },
                { id: 'jobLevelChart', label: '職級結構' },
                { id: 'genderChart', label: '性別比例' },
                { id: 'ageChart', label: '年齡分佈' },
                { id: 'tenureChart', label: '年資結構' },
                // removed education chart
                // removed factory chart
                { id: 'identityChart', label: '身分別統計' },
                { id: 'migrantStats', label: '外籍移工國籍統計' },
                { id: 'foreignStudentStats', label: '僑外生國籍統計' },
                { id: 'specialChart', label: '特殊身分統計' }, // New
            ];

            const toggleConfig = (id) => {
                onConfigChange({ ...config, [id]: !config[id] });
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-backdrop p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col max-h-[80vh] animate-fade-in">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.Settings /> 儀表板顯示設定</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icons.XCircle size={24}/></button>
                        </div>
                        <div className="p-4 overflow-y-auto">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {configItems.map(item => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => toggleConfig(item.id)}
                                        className={`flex items-center justify-between p-3 rounded-lg border cursor-pointer transition ${config[item.id] ? 'bg-blue-50 border-blue-200 text-blue-700 font-medium' : 'bg-slate-50 border-slate-200 text-slate-500'}`}
                                    >
                                        {item.label}
                                        {config[item.id] ? <Icons.Check size={18} className="text-blue-600"/> : <div className="w-4 h-4 rounded border border-slate-300"></div>}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-6 border-t border-slate-100 flex justify-end">
                            <button onClick={onClose} className="px-6 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md">完成設定</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [employees, setEmployees] = useState(INITIAL_EMPLOYEES);
            const [notification, setNotification] = useState(null);
            const [filters, setFilters] = useState({});
            const [isDeptModalOpen, setDeptModalOpen] = useState(false);
            const [isConfigModalOpen, setConfigModalOpen] = useState(false);
            const [sheetUrl, setSheetUrl] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            // Dashboard Configuration State
            const [dashboardConfig, setDashboardConfig] = useState({
                insights: true, kpi: true, deptChart: true, jobLevelChart: true,
                genderChart: true, ageChart: true, tenureChart: true, 
                identityChart: true, migrantStats: true, foreignStudentStats: true,
                specialChart: true
            });

            useEffect(() => {
                const savedUrl = localStorage.getItem('hr_dashboard_sheet_url');
                if (savedUrl) {
                    setSheetUrl(savedUrl);
                }
            }, []);

            const toggleFilter = (category, value) => {
                setFilters(prev => {
                    const newFilters = { ...prev };
                    if (newFilters[category] === value) delete newFilters[category];
                    else newFilters[category] = value;
                    return newFilters;
                });
            };

            const updateDeptFilter = (selectedDepts) => {
                setFilters(prev => {
                    const newFilters = { ...prev };
                    if (selectedDepts.length === 0) delete newFilters['dept'];
                    else newFilters['dept'] = selectedDepts; 
                    return newFilters;
                });
            };

            const clearAllFilters = () => setFilters({});

            const baseActiveEmployees = useMemo(() => employees.filter(emp => !emp.leaveDate || new Date(emp.leaveDate) > new Date()), [employees]);
            const uniqueDepartments = useMemo(() => {
                const depts = new Set(baseActiveEmployees.map(e => e.dept).filter(Boolean));
                return Array.from(depts).sort();
            }, [baseActiveEmployees]);

            const filteredEmployees = useMemo(() => {
                return baseActiveEmployees.filter(emp => {
                    for (const [key, value] of Object.entries(filters)) {
                        if (key === 'dept' && Array.isArray(value)) { if (!value.includes(emp.dept)) return false; }
                        else if (key === 'jobLevel') { if (getJobLevel(emp.role) !== value) return false; } 
                        else if (key === 'ageGroup') {
                            const age = calculateAge(emp.birthday);
                            let group = '';
                            if (age < 25) group = '< 25'; else if (age < 35) group = '25-34'; else if (age < 45) group = '35-44'; else if (age < 55) group = '45-54'; else if (age < 65) group = '55-64'; else group = '65+';
                            if (group !== value) return false;
                        }
                        else if (key === 'tenureGroup') {
                            const years = calculateTenure(emp.hireDate, emp.leaveDate);
                            let group = '';
                            if (years < 1) group = '< 1 年'; else if (years < 3) group = '1-3 年'; else if (years < 5) group = '3-5 年'; else if (years < 10) group = '5-10 年'; else group = '> 10 年';
                            if (group !== value) return false;
                        }
                        else if (key === 'special') {
                            if (value === '無') {
                                if (emp.special) return false;
                            } else {
                                if (!emp.special || !emp.special.includes(value)) return false; 
                            }
                        }
                        else if (key === 'identity') {
                            if (value === '外籍移工') {
                                if (!emp.identity || !emp.identity.includes('移工')) return false;
                            } else if (value === '僑外生') {
                                if (!emp.identity || !emp.identity.includes('僑外生')) return false;
                            } else {
                                if (emp.identity !== value) return false;
                            }
                        }
                        else { if (emp[key] !== value) return false; }
                    }
                    return true;
                });
            }, [baseActiveEmployees, filters]);

            const totalCount = baseActiveEmployees.length; 
            const filteredCount = filteredEmployees.length;
            
            const turnoverMetrics = useMemo(() => {
                const oneYearAgo = new Date();
                oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                const filterPool = employees.filter(emp => {
                    for (const [key, value] of Object.entries(filters)) {
                        if (key === 'dept' && Array.isArray(value)) { if (!value.includes(emp.dept)) return false; }
                        else if (key === 'jobLevel') { if (getJobLevel(emp.role) !== value) return false; }
                        else if (key === 'ageGroup') {} 
                        else if (key === 'tenureGroup') {}
                        else if (emp[key] !== value) return false;
                    }
                    return true;
                });
                const leftInPastYear = filterPool.filter(emp => emp.leaveDate && new Date(emp.leaveDate) >= oneYearAgo && new Date(emp.leaveDate) <= new Date()).length;
                const totalPool = filteredCount + leftInPastYear;
                const turnoverRate = totalPool === 0 ? 0 : ((leftInPastYear / totalPool) * 100).toFixed(1);
                const retentionRate = (100 - turnoverRate).toFixed(1);
                return { turnoverRate, retentionRate, leftCount: leftInPastYear };
            }, [employees, filteredCount, filters]);

            // Stats
            const stats = useMemo(() => {
                const s = { tenure: { '< 1 年': 0, '1-3 年': 0, '3-5 年': 0, '5-10 年': 0, '> 10 年': 0 }, age: { '< 25': 0, '25-34': 0, '35-44': 0, '45-54': 0, '55-64': 0, '65+': 0 }, gender: { '男': 0, '女': 0, '其他': 0 }, nat: {}, identity: {}, special: {}, jobLevel: { '高階主管': 0, '中階主管': 0, '基層主管': 0, '非主管職': 0 }, dept: {} };
                filteredEmployees.forEach(emp => {
                    const years = calculateTenure(emp.hireDate, emp.leaveDate);
                    if (years < 1) s.tenure['< 1 年']++; else if (years < 3) s.tenure['1-3 年']++; else if (years < 5) s.tenure['3-5 年']++; else if (years < 10) s.tenure['5-10 年']++; else s.tenure['> 10 年']++;
                    
                    const age = calculateAge(emp.birthday);
                    if (age < 25) s.age['< 25']++; else if (age < 35) s.age['25-34']++; else if (age < 45) s.age['35-44']++; else if (age < 55) s.age['45-54']++; else if (age < 65) s.age['55-64']++; else s.age['65+']++;
                    
                    s.gender[emp.gender || '其他'] = (s.gender[emp.gender || '其他'] || 0) + 1;
                    s.jobLevel[getJobLevel(emp.role)]++;
                    s.nat[emp.nationality || '未知'] = (s.nat[emp.nationality || '未知'] || 0) + 1;
                    s.identity[emp.identity || '國人'] = (s.identity[emp.identity || '國人'] || 0) + 1;
                    s.dept[emp.dept] = (s.dept[emp.dept] || 0) + 1;
                    
                    const sp = emp.special ? emp.special : '無';
                    s.special[sp] = (s.special[sp] || 0) + 1;
                });
                return s;
            }, [filteredEmployees]);

            const insights = useMemo(() => {
                if (filteredCount === 0) return [{ type: 'neutral', text: '請上傳員工資料以開始分析 (目前無資料)。' }];
                const list = [];
                if (turnoverMetrics.turnoverRate > 10) list.push({ type: 'red', text: `⚠️ 離職率達 ${turnoverMetrics.turnoverRate}%，高於 10% 警戒線，建議檢視該群體的薪資競爭力或管理風格。` });
                else if (turnoverMetrics.turnoverRate < 5) list.push({ type: 'green', text: `🛡️ 離職率僅 ${turnoverMetrics.turnoverRate}%，顯示該群體穩定度極高，留任策略有效。` });
                const newHirePct = ((stats.tenure['< 1 年'] || 0) / filteredCount * 100).toFixed(1);
                if (newHirePct > 30) list.push({ type: 'blue', text: `💡 新進員工佔比達 ${newHirePct}%，組織處於擴張或高流動期，建議強化新人引導 (Onboarding) 流程。` });
                const elderPct = (((stats.age['55-64'] || 0) + (stats.age['65+'] || 0)) / filteredCount * 100).toFixed(1);
                if (elderPct > 15) list.push({ type: 'orange', text: `⚠️ 55 歲以上員工佔比 ${elderPct}%，面臨退休潮風險，需提早啟動接班人計劃與技術傳承機制。` });
                const fPct = ((stats.gender['女'] || 0) / filteredCount * 100);
                if (fPct < 20 || fPct > 80) list.push({ type: 'purple', text: `💡 性別比例顯著傾斜 (女性佔 ${fPct.toFixed(1)}%)，若非產業特性，可考慮多元化招募策略以平衡團隊視角。` });
                
                if (list.length === 0) list.push({ type: 'neutral', text: '目前各項指標均在正常範圍內，無顯著異常。' });
                return list;
            }, [filteredEmployees, turnoverMetrics, stats, filteredCount]);

            const migrantWorkerStats = useMemo(() => {
                const counts = {};
                filteredEmployees.filter(e => e.identity && e.identity.includes('移工')).forEach(e => { const nat = e.nationality || '未知'; counts[nat] = (counts[nat] || 0) + 1; });
                return counts;
            }, [filteredEmployees]);

            const foreignStudentStats = useMemo(() => {
                const counts = {};
                filteredEmployees.filter(e => e.identity && e.identity.includes('僑外生')).forEach(e => { const nat = e.nationality || '未知'; counts[nat] = (counts[nat] || 0) + 1; });
                return counts;
            }, [filteredEmployees]);

            const migrantTotal = Object.values(migrantWorkerStats).reduce((a, b) => a + b, 0);
            const studentTotal = Object.values(foreignStudentStats).reduce((a, b) => a + b, 0);

            // Chart Options & Data
            const commonOptions = { maintainAspectRatio: false, onHover: (e, el) => { e.native.target.style.cursor = el.length ? 'pointer' : 'default'; } };
            const barOptions = { ...commonOptions, layout: { padding: { top: 20 } }, plugins: { legend: { display: false }, datalabels: { color: '#64748b', anchor: 'end', align: 'top', font: { weight: 'bold' }, formatter: (v) => v > 0 ? v : '' } } };
            const horizontalBarOptions = { ...commonOptions, indexAxis: 'y', layout: { padding: { right: 30 } }, plugins: { legend: { display: false }, datalabels: { color: '#64748b', anchor: 'end', align: 'right', font: { weight: 'bold' }, formatter: (v) => v > 0 ? v : '' } }, scales: { x: { grid: { display: false } } } };

            const tenureChartData = { labels: Object.keys(stats.tenure), datasets: [{ label: '人數', data: Object.values(stats.tenure), backgroundColor: '#3b82f6', borderRadius: 4 }] };
            const ageChartData = { labels: Object.keys(stats.age), datasets: [{ label: '人數', data: Object.values(stats.age), backgroundColor: '#8b5cf6', borderRadius: 4 }] };
            const genderChartData = { labels: Object.keys(stats.gender), datasets: [{ data: Object.values(stats.gender), backgroundColor: ['#3b82f6', '#ec4899', '#94a3b8'], borderWidth: 0 }] };
            const jobLevelChartData = { labels: ['高階主管', '中階主管', '基層主管', '非主管職'], datasets: [{ data: ['高階主管', '中階主管', '基層主管', '非主管職'].map(k => stats.jobLevel[k]), backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6', '#10b981'], borderWidth: 0 }] };
            
            const deptChartData = useMemo(() => {
                const sortedLabels = Object.keys(stats.dept).sort((a, b) => stats.dept[b] - stats.dept[a]);
                return {
                    labels: sortedLabels,
                    datasets: [{
                        data: sortedLabels.map(l => stats.dept[l]),
                        backgroundColor: [
                            '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#64748b', 
                            '#ec4899', '#06b6d4', '#84cc16', '#14b8a6', '#f43f5e',
                            '#6366f1', '#d946ef', '#e11d48', '#db2777', '#2563eb'
                        ],
                        borderWidth: 0
                    }]
                };
            }, [stats.dept]);

            const identityChartData = { labels: Object.keys(stats.identity), datasets: [{ label: '人數', data: Object.values(stats.identity), backgroundColor: '#06b6d4', borderRadius: 4 }] };
            
            const specialChartData = useMemo(() => {
                const labels = Object.keys(stats.special).filter(k => k !== '無');
                return { 
                    labels: labels, 
                    datasets: [{ label: '人數', data: labels.map(l => stats.special[l]), backgroundColor: '#ec4899', borderRadius: 4 }] 
                };
            }, [stats.special]);

            // --- Google Sheets Fetch ---
            const fetchGoogleSheet = async (url) => {
                if (!url) return;
                setIsLoading(true);
                try {
                    const response = await fetch(url);
                    const text = await response.text();
                    const data = normalizeImportData(parseCSV(text));
                    if (data.length > 0) {
                        setEmployees(data);
                        showNotification(`雲端同步成功！共 ${data.length} 筆資料`, 'success');
                    } else {
                        showNotification('雲端檔案似乎為空或格式不正確', 'error');
                    }
                } catch (error) {
                    console.error(error);
                    showNotification('無法讀取 Google Sheet，請確認連結權限是否設為公開', 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleUrlSubmit = () => {
                localStorage.setItem('hr_dashboard_sheet_url', sheetUrl);
                fetchGoogleSheet(sheetUrl);
            };

            // --- File Upload ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const processData = (rawData) => {
                    const normalized = normalizeImportData(rawData);
                    if (normalized.length > 0) {
                        normalized.sort((a, b) => (b.error ? 1 : 0) - (a.error ? 1 : 0));
                        setEmployees(normalized);
                        const errorCount = normalized.filter(e => e.error).length;
                        if (errorCount > 0) showNotification(`匯入完成，但有 ${errorCount} 筆資料異常，已標記並置頂。`, 'error');
                        else showNotification(`成功匯入 ${normalized.length} 筆資料！`, 'success');
                    } else {
                         showNotification('檔案無有效資料。', 'error');
                    }
                };

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                             const data = new Uint8Array(event.target.result);
                             const workbook = XLSX.read(data, { type: 'array' });
                             const firstSheetName = workbook.SheetNames[0];
                             const json = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], { raw: false, dateNF: 'yyyy-mm-dd' });
                             processData(json);
                        } else {
                             const text = event.target.result;
                             const cleanText = text.replace(/^\uFEFF/, '');
                             if (file.name.endsWith('.json')) {
                                const json = JSON.parse(cleanText);
                                processData(json);
                             } else if (file.name.endsWith('.csv')) {
                                const csvData = parseCSV(cleanText);
                                processData(csvData);
                             }
                        }
                    } catch (error) {
                        console.error(error);
                        showNotification(error.message, 'error');
                    }
                };
                
                if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                    reader.readAsArrayBuffer(file);
                } else {
                    reader.readAsText(file);
                }
                
                e.target.value = '';
            };

            const showNotification = (msg, type) => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 5000); };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 text-slate-800 font-sans">
                    {/* Toast */}
                    {notification && (
                        <div className={`fixed top-4 right-4 z-50 px-6 py-4 rounded-lg shadow-xl text-white font-medium animate-fade-in flex items-center gap-3 ${notification.type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`}>
                            {notification.type === 'error' ? <Icons.AlertTriangle /> : <Icons.UserCheck />}<div>{notification.msg}</div>
                        </div>
                    )}

                    {/* Modals */}
                    <DepartmentFilterModal 
                        isOpen={isDeptModalOpen} 
                        onClose={() => setDeptModalOpen(false)} 
                        departments={uniqueDepartments}
                        selectedDepts={filters.dept || []}
                        onApply={updateDeptFilter}
                    />

                    <DashboardConfigModal 
                        isOpen={isConfigModalOpen}
                        onClose={() => setConfigModalOpen(false)}
                        config={dashboardConfig}
                        onConfigChange={setDashboardConfig}
                    />

                    <aside className={`${sidebarOpen ? 'w-64' : 'w-20'} bg-slate-900 text-white transition-all duration-300 flex flex-col z-20 shadow-xl`}>
                        <div className="h-16 flex items-center justify-center border-b border-slate-800">
                            {sidebarOpen ? <h1 className="text-xl font-bold tracking-wider flex items-center gap-2"><div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><Icons.Activity /></div>HR<span className="text-blue-400">Portal</span></h1> : <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><Icons.Activity /></div>}
                        </div>
                        <nav className="flex-1 py-6 px-3 space-y-2">
                            {[{ id: 'dashboard', label: '總覽儀表板', icon: Icons.Activity }, { id: 'employees', label: '資料管理 (上傳/雲端)', icon: Icons.Users }].map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center p-3 rounded-xl transition-all duration-200 ${activeTab === item.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><item.icon />{sidebarOpen && <span className="ml-3 font-medium tracking-wide">{item.label}</span>}</button>
                            ))}
                        </nav>
                    </aside>

                    <div className="flex-1 flex flex-col overflow-hidden">
                        <header className="bg-white shadow-sm z-10 border-b border-slate-200">
                            <div className="h-16 flex items-center justify-between px-6">
                                <h2 className="text-lg font-bold text-slate-800">{activeTab === 'dashboard' ? '人力資源總覽' : '員工資料管理'}</h2>
                                <div className="flex items-center gap-4"><div className="flex items-center gap-3 pl-4 border-l border-slate-200"><div className="text-right hidden sm:block"><p className="text-sm font-bold text-slate-700">Admin</p><p className="text-xs text-slate-500">HR Manager</p></div><div className="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold border border-blue-200">HR</div></div></div>
                            </div>
                            
                            {activeTab === 'dashboard' && (
                                <div className="px-6 py-2 bg-blue-50 border-t border-blue-100 flex items-center gap-2 flex-wrap">
                                    <span className="text-xs font-bold text-blue-700 flex items-center gap-1"><Icons.Filter /> 篩選條件:</span>
                                    
                                    {/* Config Button */}
                                    <button 
                                        onClick={() => setConfigModalOpen(true)}
                                        className="bg-white text-slate-600 text-xs px-3 py-1 rounded border border-slate-300 hover:bg-slate-50 flex items-center gap-1 shadow-sm font-bold transition mr-1"
                                    >
                                        <Icons.Settings size={12}/> 顯示設定
                                    </button>

                                    {/* Department Multi-Select Button */}
                                    <button 
                                        onClick={() => setDeptModalOpen(true)}
                                        className="bg-white text-slate-600 text-xs px-3 py-1 rounded border border-blue-300 hover:bg-blue-50 flex items-center gap-1 shadow-sm font-bold transition"
                                    >
                                        <Icons.Briefcase size={12}/> 選擇部門 (多選)
                                    </button>

                                    {Object.entries(filters).map(([key, val]) => (
                                        <div key={key} className="bg-white text-slate-600 text-xs px-2 py-1 rounded border border-blue-200 flex items-center gap-1 shadow-sm">
                                            <span className="font-bold text-blue-600">
                                                {key === 'dept' ? '部門' : key === 'gender' ? '性別' : key === 'jobLevel' ? '職級' : key === 'ageGroup' ? '年齡' : key === 'tenureGroup' ? '年資' : key === 'special' ? '特殊身分' : key === 'identity' ? '身分' : key === 'nationality' ? '國籍' : key}:
                                            </span>
                                            {Array.isArray(val) ? `${val.length} 個已選` : val}
                                            <button onClick={() => toggleFilter(key, val)} className="hover:text-red-500"><Icons.XCircle /></button>
                                        </div>
                                    ))}
                                    {(Object.keys(filters).length > 0) && <button onClick={clearAllFilters} className="text-xs text-red-500 hover:underline ml-2">清除全部</button>}
                                </div>
                            )}
                        </header>

                        <main className="flex-1 overflow-x-hidden overflow-y-auto p-6 bg-slate-50">
                            {activeTab === 'dashboard' && (
                                <div className="animate-fade-in space-y-6">
                                    {/* AI Insights Block */}
                                    {dashboardConfig.insights && (
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
                                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icons.Lightbulb className="text-yellow-500" /> 智慧決策洞察 (AI Insights)</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {insights.map((insight, idx) => (
                                                <div key={idx} className={`p-4 rounded-xl border-l-4 flex items-start gap-3 ${
                                                    insight.type === 'red' ? 'bg-red-50 border-red-500 text-red-800' :
                                                    insight.type === 'green' ? 'bg-emerald-50 border-emerald-500 text-emerald-800' :
                                                    insight.type === 'orange' ? 'bg-orange-50 border-orange-500 text-orange-800' :
                                                    insight.type === 'blue' ? 'bg-blue-50 border-blue-500 text-blue-800' :
                                                    insight.type === 'purple' ? 'bg-purple-50 border-purple-500 text-purple-800' :
                                                    'bg-slate-50 border-slate-400 text-slate-700'
                                                }`}>
                                                    <div className="mt-0.5 text-lg">
                                                        {insight.type === 'red' || insight.type === 'orange' ? '⚠️' : 
                                                         insight.type === 'green' ? '🛡️' : '💡'}
                                                    </div>
                                                    <div className="text-sm font-medium leading-relaxed">{insight.text}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    )}

                                    {/* KPI Row */}
                                    {dashboardConfig.kpi && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between"><div className="flex justify-between items-start"><div><p className="text-sm font-medium text-slate-500">{Object.keys(filters).length > 0 ? '篩選後人數' : '在職總員工數'}</p><h3 className="text-3xl font-bold text-slate-800 mt-2">{Object.keys(filters).length > 0 ? filteredCount : totalCount}</h3></div><div className="p-3 bg-blue-50 text-blue-600 rounded-xl"><Icons.Users /></div></div></div>
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between"><div className="flex justify-between items-start"><div><p className="text-sm font-medium text-slate-500">離職率 (年)</p><h3 className="text-3xl font-bold text-slate-800 mt-2 text-red-500">{turnoverMetrics.turnoverRate}%</h3></div><div className="p-3 bg-red-50 text-red-600 rounded-xl"><Icons.UserX /></div></div></div>
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between"><div className="flex justify-between items-start"><div><p className="text-sm font-medium text-slate-500">留任率 (年)</p><h3 className="text-3xl font-bold text-slate-800 mt-2 text-emerald-500">{turnoverMetrics.retentionRate}%</h3></div><div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><Icons.UserCheck /></div></div></div>
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between"><div className="flex justify-between items-start"><div><p className="text-sm font-medium text-slate-500">平均年資</p><h3 className="text-3xl font-bold text-slate-800 mt-2">{(filteredEmployees.reduce((acc, curr) => acc + calculateTenure(curr.hireDate, curr.leaveDate), 0) / (filteredCount || 1)).toFixed(1)} 年</h3></div><div className="p-3 bg-orange-50 text-orange-600 rounded-xl"><Icons.Clock /></div></div></div>
                                    </div>
                                    )}

                                    {/* Pie Charts Row 1 */}
                                    {(dashboardConfig.deptChart || dashboardConfig.jobLevelChart) && (
                                    <div className={`grid grid-cols-1 ${dashboardConfig.deptChart && dashboardConfig.jobLevelChart ? 'lg:grid-cols-2' : 'lg:grid-cols-1'} gap-6`}>
                                        {dashboardConfig.deptChart && <ChartWithLegend title="部門人數佔比" data={deptChartData} icon={Icons.Briefcase} onSelect={(val) => toggleFilter('dept', [val])} />}
                                        {dashboardConfig.jobLevelChart && <ChartWithLegend title="職級結構" data={jobLevelChartData} icon={Icons.Award} onSelect={(val) => toggleFilter('jobLevel', val)} />}
                                    </div>
                                    )}
                                    
                                    {/* Pie Charts Row 2 & Bar Chart */}
                                    {(dashboardConfig.genderChart || dashboardConfig.ageChart) && (
                                    <div className={`grid grid-cols-1 ${dashboardConfig.genderChart && dashboardConfig.ageChart ? 'lg:grid-cols-2' : 'lg:grid-cols-1'} gap-6`}>
                                        {dashboardConfig.genderChart && <ChartWithLegend title="性別比例" data={genderChartData} icon={Icons.Users} onSelect={(val) => toggleFilter('gender', val)} />}
                                        {dashboardConfig.ageChart && (
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icons.Users /> 年齡分佈</h3><div className="h-48 relative"><ChartComponent type="bar" data={ageChartData} options={barOptions} onElementClick={(val) => toggleFilter('ageGroup', val)} /></div></div>
                                        )}
                                    </div>
                                    )}

                                    {/* Bar Charts Row */}
                                    {(dashboardConfig.tenureChart || dashboardConfig.specialChart) && (
                                    <div className={`grid grid-cols-1 ${dashboardConfig.tenureChart && dashboardConfig.specialChart ? 'lg:grid-cols-2' : 'lg:grid-cols-1'} gap-6`}>
                                        {dashboardConfig.tenureChart && <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icons.Clock /> 年資結構</h3><div className="h-64 relative"><ChartComponent type="bar" data={tenureChartData} options={barOptions} onElementClick={(val) => toggleFilter('tenureGroup', val)} /></div></div>}
                                        {dashboardConfig.specialChart && <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icons.Tag /> 特殊身分統計</h3><div className="h-64 relative"><ChartComponent type="bar" data={specialChartData} options={barOptions} onElementClick={(val) => toggleFilter('special', val)} /></div></div>}
                                    </div>
                                    )}

                                    {/* Bottom Details Row */}
                                    {(dashboardConfig.identityChart || dashboardConfig.migrantStats || dashboardConfig.foreignStudentStats) && (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        {dashboardConfig.identityChart && (
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icons.Tag /> 身分別統計</h3><div className="h-64 relative"><ChartComponent type="bar" data={identityChartData} options={horizontalBarOptions} onElementClick={(val) => toggleFilter('identity', val)} /></div></div>
                                        )}
                                        {dashboardConfig.migrantStats && (
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b pb-2"><Icons.Plane /> 外籍移工國籍統計 <span className="ml-auto text-sm bg-slate-100 px-2 py-1 rounded text-slate-600">共 {migrantTotal} 人</span></h3>{Object.keys(migrantWorkerStats).length > 0 ? (<div className="grid grid-cols-1 gap-3">{Object.entries(migrantWorkerStats).map(([nat, count]) => (<div key={nat} className="flex justify-between items-center p-3 bg-cyan-50 rounded-lg border border-cyan-100 cursor-pointer hover:bg-cyan-100" onClick={() => toggleFilter('nationality', nat)}><span className="font-medium text-cyan-800">{nat}</span><span className="font-bold text-cyan-700 bg-white px-2 py-1 rounded-md text-sm shadow-sm">{count} 人</span></div>))}</div>) : <div className="text-center py-8 text-slate-400">無資料</div>}</div>
                                        )}
                                        {dashboardConfig.foreignStudentStats && (
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100"><h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b pb-2"><Icons.Globe /> 僑外生國籍統計 <span className="ml-auto text-sm bg-slate-100 px-2 py-1 rounded text-slate-600">共 {studentTotal} 人</span></h3>{Object.keys(foreignStudentStats).length > 0 ? (<div className="grid grid-cols-1 gap-3">{Object.entries(foreignStudentStats).map(([nat, count]) => (<div key={nat} className="flex justify-between items-center p-3 bg-purple-50 rounded-lg border border-purple-100 cursor-pointer hover:bg-purple-100" onClick={() => toggleFilter('nationality', nat)}><span className="font-medium text-purple-800">{nat}</span><span className="font-bold text-purple-700 bg-white px-2 py-1 rounded-md text-sm shadow-sm">{count} 人</span></div>))}</div>) : <div className="text-center py-8 text-slate-400">無資料</div>}</div>
                                        )}
                                    </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'employees' && (
                                <div className="animate-fade-in space-y-6">
                                    <div className="bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl p-8 text-white shadow-lg">
                                        <h2 className="text-2xl font-bold mb-2 flex items-center gap-2"><Icons.Upload /> 匯入員工資料</h2>
                                        <p className="text-blue-100 opacity-90 text-sm mb-4">格式 (依序): 姓名, 部門, 職稱, 國籍, 身分類別, 特殊身分, 性別, 生日, 到職日, 離職日...</p>
                                        <label className="cursor-pointer bg-white text-blue-700 hover:bg-blue-50 font-bold py-2 px-6 rounded-xl shadow-md transition-all inline-flex items-center gap-2"><Icons.FileText /> 選擇檔案<input type="file" accept=".csv,.json,.xlsx,.xls" className="hidden" onChange={handleFileUpload} /></label>
                                    </div>
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="p-6 border-b border-slate-100 flex justify-between items-center"><h3 className="text-lg font-bold text-slate-800">完整員工名冊 ({employees.length} 筆)</h3>{employees.some(e => e.error) && <span className="text-red-500 text-sm font-bold flex items-center gap-1"><Icons.AlertTriangle /> 有異常資料請修正</span>}</div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm text-slate-600 whitespace-nowrap">
                                                <thead className="bg-slate-50 text-slate-500 font-medium"><tr>{['狀態/備註','姓名','部門','職稱','性別','身分類別','特殊身分','國籍','年齡(歲)','年資(年)'].map(h=><th key={h} className="px-6 py-3">{h}</th>)}</tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {employees.map((p, idx) => (
                                                        <tr key={idx} className={`transition ${p.error ? 'bg-red-50 hover:bg-red-100 border-l-4 border-red-500' : 'hover:bg-slate-50'}`}>
                                                            <td className="px-6 py-4">{p.error ? <div className="text-red-600 font-bold flex items-center gap-1" title={p.error}><Icons.AlertTriangle size={14}/> {p.error}</div> : <span className="text-emerald-600">正常</span>}</td>
                                                            <td className="px-6 py-4 font-bold text-slate-800" title={`生日: ${p.birthday}`}>{p.name}</td>
                                                            <td className="px-6 py-4"><span className="bg-slate-100 px-2 py-1 rounded text-xs">{p.dept}</span></td>
                                                            <td className="px-6 py-4">{p.role}</td>
                                                            <td className="px-6 py-4">{p.gender}</td>
                                                            <td className="px-6 py-4"><span className="px-2 py-1 rounded text-xs border bg-slate-50 text-slate-600 border-slate-100">{p.identity || '國人'}</span></td>
                                                            <td className="px-6 py-4">{p.special && <span className="px-2 py-1 rounded text-xs bg-orange-100 text-orange-700">{p.special}</span>}</td>
                                                            <td className="px-6 py-4">{p.nationality}</td>
                                                            <td className="px-6 py-4">{calculateAge(p.birthday)}</td>
                                                            <td className="px-6 py-4 text-blue-600 font-medium">{calculateTenure(p.hireDate, p.leaveDate).toFixed(1)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
